# Configuration file
artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_url: https://github.com/krishnaik06/datasets/raw/refs/heads/main/winequality-data.zip
  local_data_file: artifacts/data_ingestion/winequality-data.zip
  unzip_dir: artifacts/data_ingestion


data_validation:
  root_dir: artifacts/data_validation
  unzip_data_dir: artifacts/data_ingestion/winequality-red.csv
  STATUS_FILE: artifacts/data_validation/status.txt

data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_ingestion/winequality-red.csv
  test_size: 0.2
  
model_training:
  root_dir: artifacts/model_training
  X_train_data: artifacts/data_transformation/X_train.csv
  X_test_data: artifacts/data_transformation/X_test.csv
  y_train_data: artifacts/data_transformation/y_train.csv
  y_test_data: artifacts/data_transformation/y_test.csv
  model_name: model.joblib

model_evaluation:
  root_dir: artifacts/model_evaluation
  X_train_data: artifacts/data_transformation/X_train.csv
  X_test_data: artifacts/data_transformation/X_test.csv
  y_train_data: artifacts/data_transformation/y_train.csv
  y_test_data: artifacts/data_transformation/y_test.csv
  model_path: artifacts/model_training/model.joblib
  metric_file_name: artifacts/model_evaluation/metrics.json
  